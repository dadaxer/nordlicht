name: Check Updates

on:
  schedule:
    - cron: "42 */6 * * *" # check every 6 hours
  workflow_dispatch:

jobs:
  check-aurora:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: state

      - name: Fetch current Aurora digest
        id: digest
        run: |
          DIGEST=$(skopeo inspect docker://ghcr.io/ublue-os/aurora-dx:stable | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Load last known digest
        id: last
        run: |
          if [ -f .aurora_digest ]; then
            echo "last=$(cat .aurora_digest)" >> $GITHUB_OUTPUT
          else
            echo "last=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare digests
        id: compare
        run: |
          if [ "${{ steps.digest.outputs.digest }}" != "${{ steps.last.outputs.last }}" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Save new digest
        if: steps.compare.outputs.updated == 'true'
        run: |
          echo "${{ steps.digest.outputs.digest }}" > .aurora_digest
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .aurora_digest
          git commit -m "Update Aurora digest"
          git push origin state

      - name: Trigger bluebuild workflow
        if: steps.compare.outputs.updated == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          event-type: aurora-updated

  check-mullvad:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: state

      - name: Fetch current Mullvad version
        id: version
        run: |
          MULLVAD_VERSION=$(curl -s https://repository.mullvad.net/rpm/stable/x86_64/repodata/primary.xml.gz | gunzip | grep -A5 '<name>mullvad-vpn</name>' | grep '<version>' | head -1 | sed -E 's/.*<version>([0-9]+\.[0-9]+\.[0-9]+)<\/version>.*/\1/')
          echo "version=$MULLVAD_VERSION" >> $GITHUB_OUTPUT

      - name: Load last known version
        id: last
        run: |
          if [ -f .mullvad_version ]; then
            echo "last=$(cat .mullvad_version)" >> $GITHUB_OUTPUT
          else
            echo "last=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.version.outputs.version }}" != "${{ steps.last.outputs.last }}" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Save new version
        if: steps.compare.outputs.updated == 'true'
        run: |
          echo "${{ steps.version.outputs.version }}" > .mullvad_version
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .mullvad_version
          git commit -m "Update Mullvad version to ${{ steps.version.outputs.version }}"
          git push origin state

      - name: Trigger bluebuild workflow
        if: steps.compare.outputs.updated == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          event-type: aurora-updated
